# ============================================================================
#  build.yml  –  Auto-build .exe + Inno Setup installer
#  Wyzwalacz: nowy tag v*.*.* na main (tworzony przez gh release create)
#  Wynik:     iBiznesBot-Setup-vX.Y.Z.exe wgrany do GitHub Release
# ============================================================================

name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:       # możliwy też ręczny start z GitHub UI

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write      # potrzebne do uploadu do Release

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      # ── 2. Python 3.11 (stabilny dla PyInstaller) ──────────────────────────
      - name: Skonfiguruj Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Nie używamy cache: 'pip' – brak requirements.txt w repo

      # ── 3. Instaluj zależności Python ──────────────────────────────────────
      - name: Zainstaluj zależności Python
        run: |
          python -m pip install --upgrade pip
          python -m pip install `
            pyinstaller `
            flaskwebgui `
            flask `
            flask-cors `
            requests `
            pandas `
            numpy `
            pdfplumber `
            openpyxl `
            xlwt `
            pywin32 `
            pyodbc `
            deep-translator
        shell: pwsh

      # ── 3b. pywin32 post-install (rejestracja DLL na Windows CI) ───────────
      - name: pywin32 post-install
        run: python -c "import sys, os; os.system(sys.executable + ' ' + os.path.join(os.path.dirname(sys.executable), 'Scripts', 'pywin32_postinstall.py') + ' -install')"
        shell: pwsh
        continue-on-error: true   # nie przerywaj buildu jeśli krok opcjonalny zawiedzie

      # ── 4. Buduj .exe przez PyInstaller ────────────────────────────────────
      - name: Buduj iBiznesBot.exe (PyInstaller)
        run: python -m PyInstaller iBiznesBot.spec --clean --noconfirm
        shell: pwsh

      # ── 5. Skopiuj do installer/app/ ───────────────────────────────────────
      - name: Kopiuj do installer\app\
        run: |
          New-Item -ItemType Directory -Force -Path "installer\app" | Out-Null
          Copy-Item -Path "dist\iBiznesBot\*" -Destination "installer\app\" -Recurse -Force
        shell: pwsh

      # ── 6. Zainstaluj Inno Setup 6 przez Chocolatey ────────────────────────
      - name: Zainstaluj Inno Setup 6
        run: choco install innosetup -y --no-progress
        shell: cmd

      # ── 6b. Wstrzyknij wersję z version.txt do setup.iss ───────────────────
      - name: Zaktualizuj wersję w setup.iss
        run: |
          $v = (Get-Content version.txt -Raw).Trim()
          (Get-Content installer\setup.iss -Raw) `
            -replace '#define AppVersion\s+"[0-9.]+"', "#define AppVersion   `"$v`"" `
            | Set-Content installer\setup.iss -NoNewline
          echo "Wersja w setup.iss: $v"
        shell: pwsh

      # ── 7. Skompiluj instalator .exe ───────────────────────────────────────
      - name: Kompiluj installer (Inno Setup)
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss'
        shell: pwsh

      # ── 8. Odczytaj numer wersji ───────────────────────────────────────────
      - name: Odczytaj wersję z version.txt
        id: ver
        run: |
          $v = (Get-Content version.txt -Raw).Trim()
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "Wersja: $v"
        shell: pwsh

      # ── 9. Wgraj installer do GitHub Release (tylko przy push tagu) ────────
      - name: Upload iBiznesBot-Setup-vX.Y.Z.exe do Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} `
            "dist\installer\iBiznesBot-Setup-v${{ steps.ver.outputs.VERSION }}.exe" `
            --clobber
        shell: pwsh
