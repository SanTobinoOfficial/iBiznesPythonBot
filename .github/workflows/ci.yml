name: CI

on:
  push:
    branches: [ v2.0, main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors pdfplumber openpyxl pandas xlwt

      - name: Syntax check
        run: python -m py_compile server.py pdf_to_csv.py

  auto-merge:
    needs: syntax-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/v2.0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge PR v2.0 → main
        run: gh pr merge --merge --auto 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
